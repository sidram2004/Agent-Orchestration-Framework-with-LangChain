<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OrchestAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">

    <div class="glass-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2" style="bottom:20%; right:20%"></div>
        <div class="blob blob-3" style="top:20%; left:60%"></div>
    </div>

    <!-- Theme Toggle Floating -->
    <button id="theme-toggle" class="glass-btn theme-btn floating-tr"><i class="fa-solid fa-moon"></i> Theme</button>

    <div class="auth-box glass-panel slide-in">
        <div class="brand auth-brand">
            <i class="fa-solid fa-microchip neon-icon icon-lg"></i>
            <h2>OrchestAI</h2>
        </div>
        
        <div class="auth-header">
            <h3>Welcome Back</h3>
            <p>Sign in to access your multi-agent workspaces.</p>
        </div>

        <form action="/login" method="POST" class="auth-form">
            <div class="input-group">
                <i class="fa-solid fa-user input-icon"></i>
                <input type="text" name="username" placeholder="Username" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="auth-submit-btn glass-btn glowing-btn">Secure Login <i class="fa-solid fa-arrow-right"></i></button>
        </form>

        <div class="auth-footer">
            <p>New strictly classified session? <a href="/register" class="neon-link">Initialize Node</a></p>
        </div>
    </div>

    <!-- Reusing our theme logic script purely for Dark/Light switch on this page -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
